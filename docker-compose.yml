version: '3.8'

services:
  sarathi-bot:
    # Pulling the isolated 'docker' tag
    image: ghcr.io/jack101a/sarathiwa_bot:docker
    container_name: sarathi_bot_app
    restart: always
    
    shm_size: '1gb'
    
    env_file:
      - .env
      
    volumes:
      - ./auth_data:/app/.wwebjs_auth
      - ./data:/app/data   # <--- ADD THIS LINE

      
    stdin_open: true
    tty: true
    
    security_opt:
      - seccomp:unconfined
