version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sarathi_postgres
    restart: always
    environment:
      POSTGRES_DB: sarathi
      POSTGRES_USER: sarathi
      POSTGRES_PASSWORD: ${PG_PASSWORD:-sarathi_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarathi -d sarathi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sarathi_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_pass} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-wa:
    build:
      context: .
      dockerfile: packages/gateway-wa/Dockerfile
    container_name: sarathi_gateway_wa
    restart: always
    init: true
    shm_size: "1024m"
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:-sarathi_pass}@postgres:5432/sarathi
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      INSTANCE_ID: ${INSTANCE_ID:-wa-primary}
      INSTANCE_ROLE: ${INSTANCE_ROLE:-primary}
      REQUIRE_CHAT_FRONTEND: "true"
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER:-}
      ADMIN_USERS: ${ADMIN_USERS:-}
      AUTHORIZED_USERS: ${AUTHORIZED_USERS:-}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/auth_data:/app/.wwebjs_auth
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: sarathi_api_server
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:-sarathi_pass}@postgres:5432/sarathi
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set_ADMIN_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-api:
    build:
      context: .
      dockerfile: packages/worker-api/Dockerfile
    container_name: sarathi_worker_api
    restart: always
    init: true
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:-sarathi_pass}@postgres:5432/sarathi
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-browser:
    build:
      context: .
      dockerfile: packages/worker-browser/Dockerfile
    container_name: sarathi_worker_browser
    restart: always
    init: true
    shm_size: "2048m"
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:-sarathi_pass}@postgres:5432/sarathi
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
    container_name: sarathi_scheduler
    restart: always
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:-sarathi_pass}@postgres:5432/sarathi
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
