version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: sarathi
      POSTGRES_USER: sarathi
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PG_BIND:-127.0.0.1}:${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarathi -d sarathi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set_REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-wa:
    build:
      context: .
      dockerfile: packages/gateway-wa/Dockerfile
    restart: always
    init: true
    shm_size: "1024m"
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:?set_PG_PASSWORD}@postgres:5432/sarathi
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      INSTANCE_ID: ${INSTANCE_ID:-wa-primary}
      INSTANCE_ROLE: ${INSTANCE_ROLE:-primary}
      REQUIRE_CHAT_FRONTEND: "true"
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER:-}
      ADMIN_USERS: ${ADMIN_USERS:-}
      AUTHORIZED_USERS: ${AUTHORIZED_USERS:-}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      UPI_ID: ${UPI_ID:-sarathi@upi}
      UPI_NAME: ${UPI_NAME:-Sarathi Bot}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/auth_data:/app/.wwebjs_auth
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:?set_PG_PASSWORD}@postgres:5432/sarathi
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set_ADMIN_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-api:
    build:
      context: .
      dockerfile: packages/worker-api/Dockerfile
    restart: always
    init: true
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:?set_PG_PASSWORD}@postgres:5432/sarathi
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-browser:
    build:
      context: .
      dockerfile: packages/worker-browser/Dockerfile
    restart: always
    init: true
    shm_size: "2048m"
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:?set_PG_PASSWORD}@postgres:5432/sarathi
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
    restart: always
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:?set_PG_PASSWORD}@postgres:5432/sarathi
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway-tg:
    build:
      context: .
      dockerfile: packages/gateway-tg/Dockerfile
    restart: always
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      DATABASE_URL: postgres://sarathi:${PG_PASSWORD:?set_PG_PASSWORD}@postgres:5432/sarathi
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ${PG_PASSWORD:?set_PG_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set_REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      TG_TOKEN: ${TG_TOKEN:-${TELEGRAM_BOT_TOKEN:-}}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-${TG_TOKEN:-}}
      ADMIN_USERS: ${ADMIN_USERS:-}
      AUTHORIZED_TG_USERS: ${AUTHORIZED_TG_USERS:-}
      AUTHORIZED_TG_GROUPS: ${AUTHORIZED_TG_GROUPS:-}
      TELEGRAM_NOTIFY_CHAT_IDS: ${TELEGRAM_NOTIFY_CHAT_IDS:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      UPI_ID: ${UPI_ID:-sarathi@upi}
      UPI_NAME: ${UPI_NAME:-Sarathi Bot}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${CONFIG_PATH:-.}/sarathi_new/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
