version: '3.8'

x-app-env: &app-env
  TZ: ${TZ}
  NODE_ENV: ${NODE_ENV}
  APP_ENV: ${APP_ENV}
  PGHOST: ${PGHOST}
  PGPORT: ${PGPORT}
  PGDATABASE: ${PGDATABASE}
  PGUSER: ${PGUSER}
  PGPASSWORD: ${PGPASSWORD}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  LOG_LEVEL: ${LOG_LEVEL}

x-browser-env: &browser-env
  PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH}
  PUPPETEER_HEADLESS: ${PUPPETEER_HEADLESS}
  PUPPETEER_DISABLE_SANDBOX: ${PUPPETEER_DISABLE_SANDBOX}
  PUPPETEER_ARGS: ${PUPPETEER_ARGS}

x-common-volumes: &common-volumes
  - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PG_BIND}:${PG_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      TZ: ${TZ}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND}:${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-wa:
    build:
      context: .
      dockerfile: packages/gateway-wa/Dockerfile
    restart: always
    init: true
    shm_size: "1024m"
    environment:
      <<: [*app-env, *browser-env]
      INSTANCE_ID: ${INSTANCE_ID}
      INSTANCE_ROLE: ${INSTANCE_ROLE}
      REQUIRE_CHAT_FRONTEND: ${REQUIRE_CHAT_FRONTEND}
      SESSION_NAME: ${SESSION_NAME}
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      ADMIN_USERS: ${ADMIN_USERS}
      AUTHORIZED_USERS: ${AUTHORIZED_USERS}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
    volumes:
      - ${CONFIG_PATH}/sarathi_new_test1/auth_data:/app/.wwebjs_auth
      - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: always
    ports:
      - "${PORT}:3000"
    environment:
      <<: *app-env
      PORT: 3000
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      BACKUP_HEALTH_MAX_AGE_HOURS: ${BACKUP_HEALTH_MAX_AGE_HOURS}
      AUTO_CLOUD_BACKUP_ENABLED: ${AUTO_CLOUD_BACKUP_ENABLED}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-api:
    build:
      context: .
      dockerfile: packages/worker-api/Dockerfile
    restart: always
    init: true
    environment:
      <<: *app-env
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_CONCURRENCY: ${API_CONCURRENCY}
      SESSION_POOL_SIZE: ${SESSION_POOL_SIZE}
      AI_PARSING_ENABLED: ${AI_PARSING_ENABLED}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_MODEL: ${LITELLM_MODEL}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-browser:
    build:
      context: .
      dockerfile: packages/worker-browser/Dockerfile
    restart: always
    init: true
    shm_size: "2048m"
    environment:
      <<: [*app-env, *browser-env]
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BROWSER_ENGINE: ${BROWSER_ENGINE}
      BROWSER_CONCURRENCY: ${BROWSER_CONCURRENCY}
      MAX_BROWSER_PAGES: ${MAX_BROWSER_PAGES}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    deploy:
      resources:
        limits:
          memory: 2g
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
    restart: always
    environment:
      <<: *app-env
      AUTO_TRACK_CRON: ${AUTO_TRACK_CRON}
      VAHAN_TRACK_CRON: ${VAHAN_TRACK_CRON}
      AUTO_TRACK_UPDATE_CHAT_ID: ${AUTO_TRACK_UPDATE_CHAT_ID}
      VAHAN_TRACK_UPDATE_CHAT_ID: ${VAHAN_TRACK_UPDATE_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      TELEGRAM_NOTIFY_CHAT_IDS: ${TELEGRAM_NOTIFY_CHAT_IDS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUTO_CLOUD_BACKUP_ENABLED: ${AUTO_CLOUD_BACKUP_ENABLED}
      BACKUP_HEALTH_MAX_AGE_HOURS: ${BACKUP_HEALTH_MAX_AGE_HOURS}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway-tg:
    build:
      context: .
      dockerfile: packages/gateway-tg/Dockerfile
    restart: always
    environment:
      <<: *app-env
      TG_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_USERS: ${ADMIN_USERS}
      AUTHORIZED_TG_USERS: ${AUTHORIZED_TG_USERS}
      AUTHORIZED_TG_GROUPS: ${AUTHORIZED_TG_GROUPS}
      TELEGRAM_NOTIFY_CHAT_IDS: ${TELEGRAM_NOTIFY_CHAT_IDS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
