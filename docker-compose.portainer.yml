# Sarathi Bot - Portainer production stack
# Set every variable referenced here in Portainer stack env.

x-app-env: &app-env
  TZ: ${TZ}
  NODE_ENV: ${NODE_ENV}
  APP_ENV: ${APP_ENV}
  PGHOST: ${PGHOST}
  PGPORT: ${PGPORT}
  PGDATABASE: ${PGDATABASE}
  PGUSER: ${PGUSER}
  PGPASSWORD: ${PGPASSWORD}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  LOG_LEVEL: ${LOG_LEVEL}

x-browser-env: &browser-env
  PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH}
  PUPPETEER_HEADLESS: ${PUPPETEER_HEADLESS}
  PUPPETEER_DISABLE_SANDBOX: ${PUPPETEER_DISABLE_SANDBOX}
  PUPPETEER_ARGS: ${PUPPETEER_ARGS}

x-common-volumes: &common-volumes
  - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data

services:
  postgres:
    image: postgres:16-alpine
    container_name: sarathi_postgres
    restart: always
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - ${CONFIG_PATH}/sarathi_new_test1/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      ajax_network:
        aliases:
          - sarathi_postgres

  redis:
    image: redis:7-alpine
    container_name: sarathi_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      TZ: ${TZ}
    volumes:
      - ${CONFIG_PATH}/sarathi_new_test1/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      ajax_network:
        aliases:
          - sarathi_redis

  gateway-wa-1:
    image: ghcr.io/jack101a/sarathiwa_bot:gateway-wa-${IMAGE_TAG}
    container_name: sarathi_gateway_wa_1
    restart: always
    init: true
    stop_grace_period: 60s
    shm_size: "512m"
    environment:
      <<: [*app-env, *browser-env]
      INSTANCE_ID: wa-1
      INSTANCE_ROLE: primary
      REQUIRE_CHAT_FRONTEND: ${REQUIRE_CHAT_FRONTEND}
      SESSION_NAME: session-1
      AUTHORIZED_USERS: ${AUTHORIZED_USERS}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS}
      ADMIN_USERS: ${ADMIN_USERS}
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
    volumes:
      - ${CONFIG_PATH}/sarathi_new_test1/auth_data_1:/app/.wwebjs_auth
      - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - seccomp:unconfined
    networks:
      - ajax_network

  gateway-wa-2:
    image: ghcr.io/jack101a/sarathiwa_bot:gateway-wa-${IMAGE_TAG}
    container_name: sarathi_gateway_wa_2
    restart: always
    init: true
    stop_grace_period: 60s
    shm_size: "512m"
    environment:
      <<: [*app-env, *browser-env]
      INSTANCE_ID: wa-2
      INSTANCE_ROLE: primary
      REQUIRE_CHAT_FRONTEND: ${REQUIRE_CHAT_FRONTEND}
      SESSION_NAME: session-2
      AUTHORIZED_USERS: ${AUTHORIZED_USERS}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS}
      ADMIN_USERS: ${ADMIN_USERS}
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
    volumes:
      - ${CONFIG_PATH}/sarathi_new_test1/auth_data_2:/app/.wwebjs_auth
      - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - seccomp:unconfined
    networks:
      - ajax_network

  gateway-tg:
    image: ghcr.io/jack101a/sarathiwa_bot:gateway-tg-${IMAGE_TAG}
    restart: always
    environment:
      <<: *app-env
      TG_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUTHORIZED_TG_USERS: ${AUTHORIZED_TG_USERS}
      AUTHORIZED_TG_GROUPS: ${AUTHORIZED_TG_GROUPS}
      ADMIN_USERS: ${ADMIN_USERS}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      TELEGRAM_NOTIFY_CHAT_IDS: ${TELEGRAM_NOTIFY_CHAT_IDS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ajax_network

  worker-api:
    image: ghcr.io/jack101a/sarathiwa_bot:worker-api-${IMAGE_TAG}
    restart: always
    environment:
      <<: *app-env
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_CONCURRENCY: ${API_CONCURRENCY}
      SESSION_POOL_SIZE: ${SESSION_POOL_SIZE}
      AI_PARSING_ENABLED: ${AI_PARSING_ENABLED}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_MODEL: ${LITELLM_MODEL}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ajax_network

  worker-browser:
    image: ghcr.io/jack101a/sarathiwa_bot:worker-browser-${IMAGE_TAG}
    restart: always
    init: true
    stop_grace_period: 120s
    shm_size: "2048m"
    environment:
      <<: [*app-env, *browser-env]
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BROWSER_ENGINE: ${BROWSER_ENGINE}
      BROWSER_CONCURRENCY: ${BROWSER_CONCURRENCY}
      MAX_BROWSER_PAGES: ${MAX_BROWSER_PAGES}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes: *common-volumes
    security_opt:
      - seccomp:unconfined
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ajax_network

  scheduler:
    image: ghcr.io/jack101a/sarathiwa_bot:scheduler-${IMAGE_TAG}
    restart: always
    environment:
      <<: *app-env
      AUTO_TRACK_CRON: ${AUTO_TRACK_CRON}
      VAHAN_TRACK_CRON: ${VAHAN_TRACK_CRON}
      AUTO_TRACK_UPDATE_CHAT_ID: ${AUTO_TRACK_UPDATE_CHAT_ID}
      VAHAN_TRACK_UPDATE_CHAT_ID: ${VAHAN_TRACK_UPDATE_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      TELEGRAM_NOTIFY_CHAT_IDS: ${TELEGRAM_NOTIFY_CHAT_IDS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUTO_CLOUD_BACKUP_ENABLED: ${AUTO_CLOUD_BACKUP_ENABLED}
      BACKUP_HEALTH_MAX_AGE_HOURS: ${BACKUP_HEALTH_MAX_AGE_HOURS}
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ajax_network

  api:
    image: ghcr.io/jack101a/sarathiwa_bot:api-${IMAGE_TAG}
    restart: always
    environment:
      <<: *app-env
      PORT: 3000
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      AUTO_CLOUD_BACKUP_ENABLED: ${AUTO_CLOUD_BACKUP_ENABLED}
      BACKUP_HEALTH_MAX_AGE_HOURS: ${BACKUP_HEALTH_MAX_AGE_HOURS}
    ports:
      - "${PORT}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes: *common-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ajax_network

networks:
  ajax_network:
    external: true
