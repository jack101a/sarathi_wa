name: CI Checks

on:
  pull_request:
    branches:
      - scaling-production
  push:
    branches:
      - scaling-production
  workflow_dispatch:

jobs:
  validate:
    name: Validate code and deployment config
    runs-on: ubuntu-latest
    env:
      CONFIG_PATH: /tmp/sarathi-runtime
      TZ: Asia/Kolkata
      NODE_ENV: test
      APP_ENV: test
      PGHOST: postgres
      PGPORT: '5432'
      PGDATABASE: sarathi
      PGUSER: sarathi
      PGPASSWORD: ci-postgres-password
      PG_BIND: 127.0.0.1
      PG_HOST_PORT: '25432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ci-redis-password
      REDIS_BIND: 127.0.0.1
      REDIS_HOST_PORT: '26379'
      PORT: '13000'
      NGINX_HTTP_PORT: '18080'
      NGINX_HTTPS_PORT: '18443'
      ADMIN_TOKEN: ci-admin-token
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci-admin-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: find packages src scripts tests -type f -name '*.js' -print0 | xargs -0 -r -n 1 node --check

      - name: Run smoke tests
        run: |
          npm test
          npm run test:status
          npm run test:ack
          npm run test:receipt
          npm run test:vahan

      - name: Build frontend
        run: npm run build:frontend

      - name: Validate main Compose file
        run: ./scripts/compose.sh config >/tmp/sarathi-compose.yml

      - name: Validate Portainer Compose file
        env:
          CONFIG_PATH: /opt/sarathi
        run: ./scripts/compose.sh -f docker-compose.portainer.yml config >/tmp/sarathi-portainer-compose.yml

      - name: Validate Server-B Compose file
        env:
          CONFIG_PATH: /opt/sarathi
          SERVER_A_IP: 10.99.0.1
        run: ./scripts/compose.sh -f docker-compose.server-b.yml config >/tmp/sarathi-server-b-compose.yml

      - name: Check dependency audit status
        continue-on-error: true
        run: npm audit --audit-level=moderate
