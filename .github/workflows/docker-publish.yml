### SECTION: Global Config
name: Build and Publish Docker Image (wabot)

# Triggers on pushes to 'test-scaling' branch.
# Produces the same :wabot rolling tag so the VPS can pull it directly.
on:
  push:
    branches: [ "test-scaling" ]

### SECTION: Main Logic
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/jack101a/sarathiwa_bot
      # Opt into Node.js 24 now to avoid deprecation warnings from actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Cache layers in the registry to speed up future builds
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          # :wabot = rolling tag (VPS pulls this), :wabot-N = per-run rollback tag
          tags: |
            ${{ env.IMAGE_NAME }}:wabot
            ${{ env.IMAGE_NAME }}:wabot-${{ github.run_number }}
