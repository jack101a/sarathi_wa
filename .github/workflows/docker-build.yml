### SECTION: Global Config
name: Build and Publish Docker Image

# Strictly locked to the 'docker' branch. 
# Pushing to 'main' will NOT trigger this.
on:
  push:
    branches: [ "docker" ] 

### SECTION: Main Logic
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/jack101a/sarathiwa_bot
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Publish both a rolling deployment tag and a per-run rollback tag.
          tags: |
            ${{ env.IMAGE_NAME }}:docker
            ${{ env.IMAGE_NAME }}:docker-${{ github.run_number }}
