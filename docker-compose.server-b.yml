# Sarathi Bot - Server B workers/gateway stack
# Set every variable referenced here in the Server-B .env file.

x-app-env: &app-env
  TZ: ${TZ}
  NODE_ENV: ${NODE_ENV}
  APP_ENV: ${APP_ENV}
  PGHOST: ${PGHOST}
  PGPORT: ${PGPORT}
  PGDATABASE: ${PGDATABASE}
  PGUSER: ${PGUSER}
  PGPASSWORD: ${PGPASSWORD}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  LOG_LEVEL: ${LOG_LEVEL}

x-browser-env: &browser-env
  PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH}
  PUPPETEER_HEADLESS: ${PUPPETEER_HEADLESS}
  PUPPETEER_DISABLE_SANDBOX: ${PUPPETEER_DISABLE_SANDBOX}
  PUPPETEER_ARGS: ${PUPPETEER_ARGS}

x-common-volumes: &common-volumes
  - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data

services:
  gateway-wa-3:
    image: ghcr.io/jack101a/sarathiwa_bot:gateway-wa-${IMAGE_TAG}
    container_name: sarathi_gateway_wa_3
    restart: always
    init: true
    stop_grace_period: 60s
    shm_size: "512m"
    environment:
      <<: [*app-env, *browser-env]
      INSTANCE_ID: wa-3
      INSTANCE_ROLE: failover
      REQUIRE_CHAT_FRONTEND: ${REQUIRE_CHAT_FRONTEND}
      SESSION_NAME: session-3
      AUTHORIZED_USERS: ${AUTHORIZED_USERS}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS}
      ADMIN_USERS: ${ADMIN_USERS}
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_QR_NAME: ${RAZORPAY_QR_NAME}
    volumes:
      - ${CONFIG_PATH}/sarathi_new_test1/auth_data_3:/app/.wwebjs_auth
      - ${CONFIG_PATH}/sarathi_new_test1/data:/app/data
    security_opt:
      - seccomp:unconfined
    networks:
      - sarathi_home

  worker-browser:
    image: ghcr.io/jack101a/sarathiwa_bot:worker-browser-${IMAGE_TAG}
    container_name: sarathi_worker_browser_b
    restart: always
    init: true
    stop_grace_period: 120s
    shm_size: "2048m"
    environment:
      <<: [*app-env, *browser-env]
      WHATSAPP_PHONE_NUMBER: ${WHATSAPP_PHONE_NUMBER}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BROWSER_ENGINE: ${BROWSER_ENGINE}
      BROWSER_CONCURRENCY: ${BROWSER_CONCURRENCY}
      MAX_BROWSER_PAGES: ${MAX_BROWSER_PAGES}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes: *common-volumes
    security_opt:
      - seccomp:unconfined
    networks:
      - sarathi_home

networks:
  sarathi_home:
    driver: bridge
